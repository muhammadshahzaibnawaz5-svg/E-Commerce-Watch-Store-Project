<body>

<main>
<section class="bg-linear-to-br from-violet-100 via-white to-blue-100 py-16 flex justify-center items-center min-h-screen">

  <div class="bg-white/70 backdrop-blur-lg border border-white/40 shadow-2xl p-8 rounded-3xl w-full max-w-md space-y-4">

    <div class="text-center mb-6">
      <h2 class="text-4xl font-extrabold bg-linear-to-r from-violet-600 to-blue-600 bg-clip-text text-transparent">
        Login
      </h2>
      <p class="text-sm text-gray-500 mt-1">
        Sign in to continue your journey
      </p>
    </div>

    <!-- Loading indicator -->
    <div id="signin-loading" class="hidden bg-blue-50 border border-blue-200 text-blue-600 text-sm rounded-xl px-4 py-3 text-center">Please wait...</div>

    <!-- Success message -->
    <div id="signin-success" class="hidden bg-green-50 border border-green-200 text-green-600 text-sm rounded-xl px-4 py-3 text-center"></div>

    <!-- Error message -->
    <div id="signin-error" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 text-center"></div>

    <input id="signin-name" type="text" placeholder="Your Name"
      class="w-full px-4 py-3 rounded-xl bg-white/60 border border-white/40 text-sm focus:ring-2 focus:ring-violet-400 outline-none">
      
    <input id="signin-mobile" type="number" placeholder="Mobile Number"
      class="w-full px-4 py-3 rounded-xl bg-white/60 border border-white/40 text-sm focus:ring-2 focus:ring-violet-400 outline-none">

    <input id="signin-email" type="email" placeholder="Email"
      class="w-full px-4 py-3 rounded-xl bg-white/60 border border-white/40 text-sm focus:ring-2 focus:ring-violet-400 outline-none">

    <input id="signin-password" type="password" placeholder="Password"
      class="w-full px-4 py-3 rounded-xl bg-white/60 border border-white/40 text-sm focus:ring-2 focus:ring-violet-400 outline-none">

    <button onclick="handleSignIn()" class="w-full bg-linear-to-r from-violet-500 to-blue-500 text-white py-3 rounded-xl font-semibold cursor-pointer 
transition-all duration-300 
hover:from-violet-600 hover:to-blue-600 
hover:shadow-lg hover:-translate-y-0.5 
active:scale-95">
  Sign In
</button>

    <p class="text-center text-xs text-gray-400 pt-2">
      Already have an account? Fill in your details above and click Sign In.
    </p>

  </div>
</section>
</main>

<script type="module" src="../index.js"></script>
</body>
</html>
