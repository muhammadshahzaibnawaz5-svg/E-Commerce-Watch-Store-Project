<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HANDTIME - Sign In</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../stylesheet.css">
  <link rel="shortcut icon" href="../fevicon/fevicon.png" type="image/x-icon">
</head>
<body>

<main>
  <section class="bg-gradient-to-br from-violet-100 via-white to-blue-100 py-16 flex justify-center items-center min-h-screen">
    <div class="bg-white/70 backdrop-blur-lg border border-white/40 shadow-2xl p-8 rounded-3xl w-full max-w-md space-y-4">

      <div class="text-center mb-6">
        <h2 class="text-4xl font-extrabold bg-gradient-to-r from-violet-600 to-blue-600 bg-clip-text text-transparent">
          Login
        </h2>
        <p class="text-sm text-gray-500 mt-1">Sign in to continue your journey</p>
      </div>

      <div id="signin-loading" class="hidden bg-blue-50 border border-blue-200 text-blue-600 text-sm rounded-xl px-4 py-3 text-center">
        ⏳ Please wait...
      </div>
      <div id="signin-success" class="hidden bg-green-50 border border-green-200 text-green-600 text-sm rounded-xl px-4 py-3 text-center"></div>
      <div id="signin-error"   class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 text-center"></div>

      <input id="signin-name"     type="text"     placeholder="Your Name"
        class="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-sm focus:ring-2 focus:ring-violet-400 outline-none">

      <input id="signin-mobile"   type="tel"      placeholder="Mobile Number"
        class="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-sm focus:ring-2 focus:ring-violet-400 outline-none">

      <input id="signin-email"    type="email"    placeholder="Email"
        class="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-sm focus:ring-2 focus:ring-violet-400 outline-none">

      <input id="signin-password" type="password" placeholder="Password (min 6 characters)"
        class="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-sm focus:ring-2 focus:ring-violet-400 outline-none">

      <!-- ✅ onclick directly on button — 100% works regardless of script timing -->
      <button
        onclick="doSignIn()"
        class="w-full bg-gradient-to-r from-violet-500 to-blue-500 text-white py-3 rounded-xl font-semibold cursor-pointer transition-all duration-300 hover:from-violet-600 hover:to-blue-600 hover:shadow-lg hover:-translate-y-0.5 active:scale-95">
        Sign In
      </button>

      <p class="text-center text-xs text-gray-400 pt-2">
        New here? Fill in your details and click Sign In to create an account.
      </p>

    </div>
  </section>
</main>

<!-- ✅ Script is inline in <head> so doSignIn() is defined before any click -->
<script>
  function doSignIn() {

    var name     = document.getElementById('signin-name').value.trim()
    var mobile   = document.getElementById('signin-mobile').value.trim()
    var email    = document.getElementById('signin-email').value.trim()
    var password = document.getElementById('signin-password').value.trim()

    var loading  = document.getElementById('signin-loading')
    var success  = document.getElementById('signin-success')
    var error    = document.getElementById('signin-error')

    // Reset all messages
    loading.classList.add('hidden')
    success.classList.add('hidden')
    error.classList.add('hidden')

    // ── Validation ──────────────────────────────────────────
    if (!name) {
      error.textContent = '❌ Please enter your name.'
      error.classList.remove('hidden')
      return
    }

    if (!email || !email.includes('@') || !email.includes('.')) {
      error.textContent = '❌ Please enter a valid email address.'
      error.classList.remove('hidden')
      return
    }

    if (password.length < 6) {
      error.textContent = '❌ Password must be at least 6 characters.'
      error.classList.remove('hidden')
      return
    }

    // ── Show loading ─────────────────────────────────────────
    loading.classList.remove('hidden')

    // ── Save user to localStorage ────────────────────────────
    var userData = {
      name:      name,
      mobile:    mobile,
      email:     email,
      loggedIn:  true,
      loginTime: Date.now()
    }

    try {
      localStorage.setItem('handtime_user', JSON.stringify(userData))
    } catch (err) {
      loading.classList.add('hidden')
      error.textContent = '❌ Browser storage blocked. Please enable cookies/storage.'
      error.classList.remove('hidden')
      return
    }

    // ── Confirm it saved correctly ───────────────────────────
    var check = localStorage.getItem('handtime_user')
    if (!check) {
      loading.classList.add('hidden')
      error.textContent = '❌ Could not save session. Try another browser.'
      error.classList.remove('hidden')
      return
    }

    // ── Success — redirect ───────────────────────────────────
    loading.classList.add('hidden')
    success.textContent = '✅ Signed in as ' + name + '! Redirecting...'
    success.classList.remove('hidden')

    setTimeout(function () {
      var returnTo = sessionStorage.getItem('signin_return')
      sessionStorage.removeItem('signin_return')

      if (returnTo && returnTo.length > 0 && !returnTo.includes('Sign-in.html')) {
        window.location.href = returnTo
      } else {
        // Sign-in.html lives at src/Pages/ — go up two levels to root
        window.location.href = '../../index.html'
      }
    }, 1200)
  }

  // ── Enter key support ────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSignIn()
  })
</script>

<!-- ✅ Load the main module AFTER the inline script — only for auth state sync -->
<script type="module" src="../index.js"></script>

</body>
</html>
